name: Update Macro Data

on:
  schedule:
    # 8am ET daily (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests

      - name: Fetch latest macro data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch-data.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/macro.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro.json
          git commit -m "chore: update macro data $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Netlify redeploy
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK }}" || true
